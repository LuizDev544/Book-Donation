<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Livro | Vulture Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/Styles/Global.css">
    <link rel="stylesheet" href="/Styles/Cadastrar.css">
</head>
<body class="bg-page">

    <header class="navbar-global">
        <h1>Vulture Books</h1>
        <img src="/Imagens/Urubu2.png" alt="Logo">
    </header>

    <div class="content-wrapper">
        <div class="card p-5 form-container">
            <h2 class="text-center mb-5 text-title">Cadastrar Novo Livro</h2>
            
            <form action="/livros/cadastrar" method="POST">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Título do Livro</label>
                        <input type="text" class="form-control" name="titulo" placeholder="Ex: O Senhor dos Anéis">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status do Livro</label>
                        <select class="form-select" name="statusInicial">
                            <option selected disabled>Selecione o estado atual</option>
                            <option value="DISPONIVEL">Disponível</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" class="form-control" name="nomeAutor" placeholder="Ex: J.R.R. Tolkien">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gênero</label>
                        <select class="form-select" name="nomeGenero">
                            <option selected disabled>Escolha o gênero...</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Ano de Lançamento</label>
                        <input type="number" class="form-control" name="anoLancamento" placeholder="Ex: 1954">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Total de Páginas</label>
                        <input type="number" class="form-control" name="quantidadePaginas" placeholder="Ex: 1200">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Idioma</label>
                        <input type="text" class="form-control" name="nomeIdioma" placeholder="Ex: Português">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Descrição / Resumo</label>
                    <textarea class="form-control" name="textoDescricao" rows="3" placeholder="Conte um pouco sobre a obra..."></textarea>
                </div>

                <div class="d-grid gap-3">
                    <button type="submit" class="btn-salvar-doacao">Salvar Doação</button>
                    <a href="/livros/painel" class="btn-cancelar">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
    <footer class="footer-global">
        Sistema de Doação de Livros
    </footer>
</body>
</html>
